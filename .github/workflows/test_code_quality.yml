name: Codebase Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
        shell: bash

      - name: Make scripts executable
        run: chmod +x scripts/*.sh
        shell: bash

      - name: Run ShellCheck tests
        run: ./scripts/userver.sh test --shellcheck
        shell: bash

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh
        shell: bash

      - name: Run unit tests
        run: ./scripts/userver.sh test --unit-tests
        shell: bash

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh
        shell: bash

      - name: Run integration tests
        run: ./scripts/userver.sh test --integration
        shell: bash
