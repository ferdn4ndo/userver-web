services:
  userver-nginx-proxy:
    container_name: userver-nginx-proxy
    image: nginxproxy/nginx-proxy:1.10-alpine
    # Do not use group_add here: rootless Docker often fails with setgroups: invalid argument
    # for socket GIDs (e.g. 101000). Default container root can use DOCKER_HOST_SOCK (rootless path).
    env_file:
      - nginx-proxy/.env
    # Rootless Docker cannot publish host ports < 1024; set NGINX_HTTP_PORT=8080 etc. in .env
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:rw
      - ./nginx-proxy/conf:/etc/nginx/conf.d/:rw
      - ./nginx-proxy/logs:/var/log/nginx/:rw
      - ./nginx-proxy/nginx.tmpl:/app/nginx.tmpl:rw
      - nginx-vhost:/etc/nginx/vhost.d:rw
      - nginx-html:/usr/share/nginx/html:rw
      # :rw avoids some rootless/docker setups where :ro breaks socket access
      - ${DOCKER_HOST_SOCK:-/var/run/docker.sock}:/tmp/docker.sock
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy"

  userver-letsencrypt:
    container_name: userver-letsencrypt
    image: nginxproxy/acme-companion:2.6
    depends_on:
      - userver-nginx-proxy
    env_file:
      - letsencrypt/.env
    volumes:
      - ./certs:/etc/nginx/certs:rw
      - nginx-vhost:/etc/nginx/vhost.d:rw
      - nginx-html:/usr/share/nginx/html:rw
      - ${DOCKER_HOST_SOCK:-/var/run/docker.sock}:/var/run/docker.sock

  userver-monitor:
    container_name: userver-monitor
    image: ferdn4ndo/docker-containers-monitor:1.0.1
    env_file:
      - ./monitor/.env
    volumes:
      - ${DOCKER_HOST_SOCK:-/var/run/docker.sock}:/var/run/docker.sock

  userver-whoami:
    container_name: userver-whoami
    image: traefik/whoami:v1.11
    expose:
      - 80
    env_file:
      - whoami/.env

networks:
  default:
    name: nginx-proxy
    external: true

volumes:
  nginx-vhost:
  nginx-html:
